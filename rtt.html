ame="av "+y;v.textContent=y=="bot"?"🤖":"أنت";let m=document.createElement("div");m.className="msg";let c=document.createElement("div"),e=document.createElement("div");e.className="meta";e.innerHTML=`<span>${y=="bot"?"EXTR97 AI":"أنت"}</span><span>${tm()}</span>`;a?type(c,t):c.innerText=t,m.appendChild(c),m.appendChild(e),y=="user"?(w.appendChild(m),w.appendChild(v)):(w.appendChild(v),w.appendChild(m)),r.appendChild(w),msgs.appendChild(r),msgs.scrollTop=msgs.scrollHeight}function type(el,t,s=14){el.innerText="";let i=0;!function n(){i<t.length&&(el.innerText+=t.charAt(i++),msgs.scrollTop=msgs.scrollHeight,setTimeout(n,s))}()}function typing(){let r=document.createElement("div");r.className="row bot";r.id="typingRow";let w=document.createElement("div");w.className="wrap";let v=document.createElement("div");v.className="av bot";v.textContent="🤖";let m=document.createElement("div");m.className="msg";m.innerHTML=`<div>جاري الكتابة...</div><div class="typing"><span></span><span></span><span></span></div><div class="meta"><span>EXTR97 AI</span><span>${tm()}</span></div>`;w.appendChild(v);w.appendChild(m);r.appendChild(w);msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight}function rmTyping(){let t=document.getElementById("typingRow");t&&t.remove()}async function ask(q){let r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+API_KEY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},contents:[{role:"user",parts:[{text:q}]}],generationConfig:{temperature:.7,topP:.9,topK:40,maxOutputTokens:700}})});return await r.json()}async function send(){let t=txt.value.trim();if(!t)return;add(t,"user");txt.value="";rs();typing();try{let d=await ask(t);rmTyping();if(d.error)return add("حدث خطأ أثناء الاتصال، تأكد من صحة مفتاح الـ API أو أعد المحاولة لاحقًا.","bot",1),console.log(d.error);let r=d?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();r?add(r
