<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>لوحة تحكم BINO8</title>
<style>
:root{
--bg1:#08131f;--bg2:#0d2032;--bg3:#102b42;--line:#244962;--txt:#eef8ff;--sub:#9db9cb;
--sky1:#76d5ff;--sky2:#28aef3;--sky3:#0d7dcc;
--gold1:#fff0ad;--gold2:#ffd766;--gold3:#d9a319;
--green1:#3fe08a;--green2:#1dbd68;
--red1:#ff7a7a;--red2:#df2d2d;
--orange1:#ffd07a;--orange2:#f0a61e;
--card:linear-gradient(180deg,rgba(15,35,53,.96),rgba(10,25,39,.98));
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Tahoma,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;overflow-x:hidden;background:
radial-gradient(650px 280px at 85% -5%,#79d8ff22 0,transparent 60%),
radial-gradient(500px 240px at 8% 100%,#ffd65f18 0,transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2) 40%,var(--bg3) 100%);
color:var(--txt)}
body:before,body:after{content:"";position:fixed;border-radius:50%;pointer-events:none;filter:blur(40px);z-index:0}
body:before{width:260px;height:260px;top:-80px;right:-80px;background:#57cfff24}
body:after{width:250px;height:250px;left:-90px;bottom:-90px;background:#ffd7661b}
.app{position:relative;z-index:1;max-width:1080px;margin:auto;min-height:100dvh;padding:calc(14px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left))}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.tt{font-size:28px;font-weight:900;letter-spacing:.3px;background:linear-gradient(90deg,#fff6cf,#ffd766 35%,#8ddfff 78%,#dbf5ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.sb{font-size:12px;color:var(--sub);margin-top:4px}
.tools{display:flex;gap:8px;flex-wrap:wrap}
.search,.refresh{height:44px;border:none;border-radius:15px;font:inherit}
.search{width:min(300px,100%);padding:0 14px;background:linear-gradient(180deg,#112a40,#0c2031);border:1px solid #2b526c;color:#fff;outline:none}
.search::placeholder{color:#8ba8bc}
.refresh{padding:0 15px;background:linear-gradient(135deg,#1a3955,#1d5f86);border:1px solid #3b6a89;color:#ecf9ff;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:8px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat{background:linear-gradient(180deg,#11293f,#0c1e2f);border:1px solid #2b5069;border-radius:20px;padding:13px 14px;box-shadow:0 12px 24px #0000001f}
.stat b{display:block;font-size:22px;font-weight:900}
.stat span{display:block;font-size:12px;color:var(--sub);margin-top:4px;font-weight:800}
.stat.g b{color:#ffd766}.stat.s b{color:#84dcff}.stat.c b{color:#fff2b8}.stat.m b{color:#9ae5ff}
.list{display:grid;gap:12px}
.card{background:var(--card);border:1px solid #234760;border-radius:24px;overflow:hidden;box-shadow:0 14px 34px #00000028}
.head{display:flex;align-items:center;gap:12px;padding:14px}
.who{display:flex;align-items:center;gap:9px;min-width:fit-content}
.ava{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;flex:0 0 54px;background:linear-gradient(135deg,var(--gold1),var(--gold2) 45%,var(--sky1));box-shadow:0 10px 20px #00000025,inset 0 2px 10px #ffffff75;border:1px solid #ffffff55}
.ava svg{width:24px;height:24px;fill:#5c4300}
.uid{height:30px;display:flex;align-items:center;padding:0 11px;border-radius:999px;background:linear-gradient(135deg,#133148,#1a5477);border:1px solid #3e7395;color:#cdefff;font-size:12px;font-weight:900;white-space:nowrap}
.mid{min-width:0;flex:1}
.line1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nm{font-size:16px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.state{height:24px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:900;display:inline-flex;align-items:center}
.state.on{background:#113525;color:#aef4ca;border:1px solid #245e42}
.state.off{background:#3b1d1d;color:#ffb7b7;border:1px solid #7b3a3a}
.line2{font-size:12px;color:var(--sub);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{height:24px;padding:0 9px;border-radius:999px;font-size:11px;font-weight:900;display:inline-flex;align-items:center;background:linear-gradient(135deg,#153450,#17405f);border:1px solid #2f5f7d;color:#d7f1ff}
.scan,.edit,.toggle,.del,.save,.cancel{border:none;cursor:pointer;font:inherit;transition:.18s}
.scan,.edit,.toggle,.del{display:flex;align-items:center;justify-content:center;gap:7px}
.scan{
height:34px;min-width:62px;padding:0 11px;border-radius:12px;
background:linear-gradient(135deg,var(--green1),var(--green2));
color:#072714;font-size:12px;font-weight:900;
box-shadow:0 8px 18px #1dbd6830;
}
.edit{
height:36px;padding:0 12px;border-radius:12px;
background:linear-gradient(135deg,var(--gold1),var(--gold2) 45%,var(--gold3));
color:#4a3200;font-size:12px;font-weight:900;box-shadow:0 8px 18px #d9a3192b
}
.toggle{
height:38px;padding:0 12px;border-radius:12px;
background:linear-gradient(135deg,#ffe0a0,#f3b542);
color:#4a2b00;font-size:12px;font-weight:900
}
.del{
height:38px;padding:0 12px;border-radius:12px;
background:linear-gradient(135deg,var(--red1),var(--red2));
color:#fff;font-size:12px;font-weight:900
}
.scan:active,.edit:active,.toggle:active,.del:active,.refresh:active,.save:active,.cancel:active{transform:scale(.985)}
.det{display:none;padding:0 14px 14px}
.card.open .det{display:block;animation:fade .2s ease}
.box{background:linear-gradient(180deg,#0a1825,#0b1b2b);border:1px solid #1f4058;border-radius:18px;padding:10px;display:grid;gap:8px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:linear-gradient(180deg,#0f2435,#0d2030);border:1px solid #1e3b51;border-radius:14px;padding:10px 12px}
.k{min-width:128px;font-size:12px;color:#9eb9cb;font-weight:900}
.v{flex:1;min-width:130px;font-size:14px;font-weight:900;word-break:break-word;color:#f5fbff}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.loader{width:12px;height:12px;border:2px solid #ffffff42;border-top-color:#fff;border-radius:50%;display:none;animation:spin .7s linear infinite}
.loading .loader{display:inline-block}
.empty{padding:28px 14px;text-align:center;background:linear-gradient(180deg,#10263a,#0d1f2f);border:1px solid #264b64;border-radius:22px;color:#a7c0d0}
.toast{position:fixed;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(10px);background:linear-gradient(135deg,#163149,#1b5678);border:1px solid #3c7598;color:#fff;padding:10px 14px;border-radius:14px;font-size:12px;font-weight:900;opacity:0;pointer-events:none;transition:.2s;z-index:50;max-width:calc(100vw - 24px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ov{position:fixed;inset:0;background:#0008;display:none;align-items:flex-end;justify-content:center;z-index:60;padding:10px}
.ov.show{display:flex}
.md{
width:min(560px,100%);
background:linear-gradient(180deg,#11283d,#0b1c2c);
border:1px solid #2e5e7d;
border-radius:24px;
padding:14px;
box-shadow:0 24px 60px #00000055;
animation:up .18s ease
}
.mttl{font-size:18px;font-weight:900;margin-bottom:10px;background:linear-gradient(90deg,#fff2be,#ffd766,#9fe5ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.minp{
width:100%;height:52px;border:none;outline:none;border-radius:15px;
background:#0c2133;border:1px solid #2a536f;color:#fff;padding:0 14px;font-size:14px;font-weight:900
}
.mbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.save,.cancel{height:44px;padding:0 16px;border-radius:14px;font-weight:900}
.save{background:linear-gradient(135deg,var(--gold1),var(--gold2) 45%,var(--gold3));color:#4b3200}
.cancel{background:#17354e;color:#e1f4ff;border:1px solid #315c7a}
.foot{padding:12px 2px 2px;text-align:center;font-size:11px;color:#86a3b8;line-height:1.8}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@media(max-width:860px){.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){
.tt{font-size:23px}
.tools,.search,.refresh{width:100%}
.head{padding:12px;gap:10px}
.k,.v{min-width:100%}
.uid{font-size:11px;padding:0 9px}
.scan{min-width:58px;height:32px;font-size:11px;padding:0 10px}
}
@media(max-width:460px){
.app{padding-inline:10px}
.stats{grid-template-columns:1fr}
.head{gap:9px}
.ava{width:50px;height:50px;flex-basis:50px}
.uid{height:28px}
.nm{font-size:15px}
.meta{margin-top:7px}
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <div class="tt">لوحة تحكم BINO8</div>
      <div class="sb">تصميم ذهبي × سماوي احترافي، متصل مباشرة بقاعدة Firestore</div>
    </div>
    <div class="tools">
      <input id="q" class="search" placeholder="بحث بالاسم أو البريد أو الآيدي">
      <button id="refreshBtn" class="refresh"><span class="loader"></span>تحديث</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat g"><b id="stUsers">0</b><span>عدد المستخدمين</span></div>
    <div class="stat s"><b id="stBal">0</b><span>إجمالي الأرصدة</span></div>
    <div class="stat c"><b id="stOff">0</b><span>الحسابات المعطلة</span></div>
    <div class="stat m"><b id="stVer">0</b><span>الحسابات الموثقة</span></div>
  </div>

  <div id="list" class="list">
    <div class="empty">جاري تحميل الحسابات...</div>
  </div>

  <div class="foot">ملاحظة: التعطيل والحذف هنا على مستندات Firestore داخل مجموعة users.</div>
</div>

<div id="toast" class="toast"></div>

<div id="ov" class="ov">
  <div class="md">
    <div id="mttl" class="mttl">تعديل</div>
    <input id="minp" class="minp">
    <div class="mbtns">
      <button id="saveBtn" class="save">حفظ</button>
      <button id="cancelBtn" class="cancel">إلغاء</button>
    </div>
  </div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {getFirestore,collection,onSnapshot,doc,updateDoc,deleteDoc} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const C={
  apiKey:"AIzaSyBOUqLixfphg3b8hajc4hkwV-VJmldGBVw",
  authDomain:"randers-c640b.firebaseapp.com",
  projectId:"randers-c640b",
  storageBucket:"randers-c640b.firebasestorage.app",
  messagingSenderId:"391496092929",
  appId:"1:391496092929:web:58208b4eb3e6f9a8571f00",
  measurementId:"G-DBDSVVF7PS"
};

const app=initializeApp(C),db=getFirestore(app);
const $=s=>document.querySelector(s);
const list=$("#list"),q=$("#q"),toast=$("#toast"),refreshBtn=$("#refreshBtn");
const ov=$("#ov"),mttl=$("#mttl"),minp=$("#minp"),saveBtn=$("#saveBtn"),cancelBtn=$("#cancelBtn");

let USERS=[],CURRENT=null,UNSUB=null;

const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const moneyNum=v=>{let n=parseFloat(String(v??0).replace(/[^\d.-]/g,""));return isNaN(n)?0:n};
const moneyTxt=n=>new Intl.NumberFormat("en-US").format(n);
const say=m=>{toast.textContent=m;toast.classList.add("show");clearTimeout(window._tt);window._tt=setTimeout(()=>toast.classList.remove("show"),1800)};
const load=(b,on,txt)=>{if(!b)return;if(on){b.classList.add("loading");b.dataset.o=b.innerHTML;b.innerHTML='<span class="loader"></span>'+(txt||"جارٍ التنفيذ")}else{b.classList.remove("loading");if(b.dataset.o)b.innerHTML=b.dataset.o}};
const dt=v=>{
  if(!v)return"-";
  if(typeof v==="string")return v;
  try{
    if(v.toDate){
      const d=v.toDate();
      return d.toLocaleDateString("ar-EG")+" - "+d.toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
    }
  }catch(e){}
  return String(v);
};
const sortUsers=a=>a.sort((x,y)=>{
  const ax=x.createdAt?.seconds||0, ay=y.createdAt?.seconds||0;
  return ay-ax;
});

function setStats(arr){
  $("#stUsers").textContent=arr.length;
  $("#stBal").textContent=moneyTxt(arr.reduce((t,u)=>t+moneyNum(u.balance),0));
  $("#stOff").textContent=arr.filter(u=>u.disabled).length;
  $("#stVer").textContent=arr.filter(u=>u.isVerified).length;
}

function filt(){
  const v=q.value.trim().toLowerCase();
  if(!v)return USERS;
  return USERS.filter(u=>
    ((u.profileName||"")+" "+(u.email||"")+" "+(u.uniqueId||"")+" "+(u.accountId||u.id||"")).toLowerCase().includes(v)
  );
}

function iconUser(){
  return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4.2 4.2 0 1 0 0-8.4A4.2 4.2 0 0 0 12 12zm0 2.1c-4.48 0-8.1 2.38-8.1 5.31 0 .33.27.59.6.59h15c.33 0 .6-.26.6-.59 0-2.93-3.62-5.31-8.1-5.31z"/></svg>`;
}

function row(id,key,label,val){
  return `
    <div class="row">
      <div class="k">${label}</div>
      <div class="v">${esc(val)}</div>
      <button class="edit" data-id="${id}" data-key="${key}" data-label="${esc(label)}"><span class="loader"></span>تعديل</button>
    </div>
  `;
}

function card(u){
  const id=u.id;
  const name=esc(u.profileName||u.email?.split("@")[0]||"مستخدم");
  const email=esc(u.email||"-");
  const uid=esc(u.uniqueId||"-");
  const acc=esc(u.accountId||u.id);
  const bal=esc(u.balance??0);
  const wd=esc(u.totalWithdrawals??0);
  const dp=esc(u.totalDeposits??0);
  const cr=esc(u.createdAtText||dt(u.createdAt));
  const state=u.disabled?`<span class="state off">معطل</span>`:`<span class="state on">نشط</span>`;
  const provider=esc(u.provider||"email");
  const verified=u.isVerified?"موثق":"غير موثق";
  return `
    <div class="card" id="c_${id}">
      <div class="head">
        <div class="who">
          <div class="ava">${iconUser()}</div>
          <div class="uid">#${uid}</div>
        </div>

        <div class="mid">
          <div class="line1">
            <div class="nm">${name}</div>
            ${state}
          </div>
          <div class="line2">${email}</div>
          <div class="meta">
            <span class="pill">الحساب: ${acc}</span>
            <span class="pill">${provider}</span>
            <span class="pill">${verified}</span>
          </div>
        </div>

        <button class="scan" data-open="${id}"><span class="loader"></span>فحص</button>
      </div>

      <div class="det">
        <div class="box">
          ${row(id,"balance","رصيد المستخدم",bal)}
          ${row(id,"totalWithdrawals","إجمالي السحوبات",wd)}
          ${row(id,"totalDeposits","إجمالي الإيداعات",dp)}
          ${row(id,"createdAtText","تاريخ إنشاء الحساب",cr)}
          ${row(id,"email","بريد إلكتروني المستخدم",email)}
          ${row(id,"accountId","آيدي الحساب",acc)}
          ${row(id,"uniqueId","آيدي مستخدم الرقم",uid)}
          <div class="actions">
            <button class="toggle" data-dis="${id}"><span class="loader"></span>${u.disabled?"إعادة تفعيل الحساب":"تعطيل الحساب"}</button>
            <button class="del" data-del="${id}"><span class="loader"></span>حذف الحساب</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function render(){
  const arr=filt();
  setStats(USERS);
  list.innerHTML=arr.length?arr.map(card).join(""):`<div class="empty">لا يوجد حسابات مطابقة للبحث</div>`;
}

function live(){
  if(UNSUB)UNSUB();
  load(refreshBtn,1,"جاري التحديث");
  UNSUB=onSnapshot(collection(db,"users"),snap=>{
    USERS=sortUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
    render();
    load(refreshBtn,0);
  },err=>{
    console.error(err);
    list.innerHTML=`<div class="empty">تعذر تحميل البيانات، تأكد من Firestore Rules واتصال المشروع.</div>`;
    load(refreshBtn,0);
  });
}

function openEdit(id,key,label,val){
  CURRENT={id,key};
  mttl.textContent="تعديل "+label;
  minp.value=val??"";
  ov.classList.add("show");
  setTimeout(()=>minp.focus(),30);
}

function closeEdit(){
  ov.classList.remove("show");
  CURRENT=null;
}

async function saveEdit(){
  if(!CURRENT)return;
  load(saveBtn,1,"جارٍ الحفظ");
  try{
    await updateDoc(doc(db,"users",CURRENT.id),{[CURRENT.key]:minp.value.trim()});
    say("تم الحفظ بنجاح");
    closeEdit();
  }catch(e){
    console.error(e);
    say("فشل الحفظ");
  }finally{
    load(saveBtn,0);
  }
}

async function toggleUser(id,btn){
  load(btn,1,"جارٍ التنفيذ");
  try{
    const u=USERS.find(x=>x.id===id);
    await updateDoc(doc(db,"users",id),{disabled:!u?.disabled});
    say(u?.disabled?"تمت إعادة التفعيل":"تم تعطيل الحساب");
  }catch(e){
    console.error(e);
    say("فشل التنفيذ");
  }finally{
    load(btn,0);
  }
}

async function deleteUser(id,btn){
  if(!confirm("هل تريد حذف هذا الحساب من Firestore؟"))return;
  load(btn,1,"جارٍ الحذف");
  try{
    await deleteDoc(doc(db,"users",id));
    say("تم حذف الحساب");
  }catch(e){
    console.error(e);
    say("فشل الحذف");
  }finally{
    load(btn,0);
  }
}

document.addEventListener("click",e=>{
  const op=e.target.closest("[data-open]");
  if(op){
    const id=op.dataset.open;
    const c=$("#c_"+id);
    const is=c.classList.contains("open");
    document.querySelectorAll(".card").forEach(x=>x.classList.remove("open"));
    if(!is)c.classList.add("open");
    return;
  }

  const ed=e.target.closest(".edit");
  if(ed){
    const id=ed.dataset.id,key=ed.dataset.key,label=ed.dataset.label;
    const u=USERS.find(x=>x.id===id)||{};
    const val=key==="createdAtText"?(u.createdAtText||dt(u.createdAt)):(u[key]??(key==="accountId"?(u.accountId||u.id):""));
    openEdit(id,key,label,val);
    return;
  }

  const ds=e.target.closest("[data-dis]");
  if(ds){
    toggleUser(ds.dataset.dis,ds);
    return;
  }

  const dl=e.target.closest("[data-del]");
  if(dl){
    deleteUser(dl.dataset.del,dl);
    return;
  }
});

q.addEventListener("input",render);
refreshBtn.onclick=live;
saveBtn.onclick=saveEdit;
cancelBtn.onclick=closeEdit;
ov.onclick=e=>{if(e.target===ov)closeEdit()};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeEdit();
  if(e.key==="Enter"&&ov.classList.contains("show"))saveEdit();
});

live();
</script>
</body>
</html>
